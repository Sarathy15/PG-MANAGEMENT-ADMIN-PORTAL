<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - Notice Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="bg-slate-50 min-h-screen flex overflow-hidden">
  <!-- Page Loader Splash -->
  <div id="page-loader-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f8fafc; z-index: 999999; display: flex; align-items: center; justify-content: center; transition: opacity 0.25s ease-out, visibility 0.25s ease-out;">
    <div style="width: 40px; height: 40px; border: 3.5px solid rgba(125, 194, 66, 0.12); border-top-color: #7DC242; border-radius: 50%; animation: loader-spin 0.6s linear infinite;"></div>
    <style>@keyframes loader-spin { to { transform: rotate(360deg); } }</style>
    <script>(function(){const fade=()=>{const el=document.getElementById('page-loader-overlay');if(el){el.style.opacity='0';el.style.visibility='hidden';setTimeout(()=>el.remove(),250);}};document.addEventListener('DOMContentLoaded',fade);window.addEventListener('load',fade);setTimeout(fade,1200);})();</script>
  </div>

  <div id="sidebar-container" class="h-screen sticky top-0 hidden md:block"></div>

  <div class="flex-1 flex flex-col min-w-0 overflow-y-auto h-screen">
    <div id="header-container"></div>

    <main class="flex-1 p-6 space-y-6">
      
      <!-- Top actions panel -->
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Active Notice Bulletin</h2>
          <p class="text-sm text-slate-500 mt-0.5">Broadcast and schedule announcements, warnings, maintenance notices, or rules changes.</p>
        </div>
        <button onclick="openNoticeModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-semibold shadow-md shadow-indigo-150 transition-all flex items-center gap-2 text-sm">
          <i data-lucide="megaphone" class="w-4.5 h-4.5"></i>
          <span>Create Announcement</span>
        </button>
      </div>

      <!-- Notices Grid -->
      <div id="notices-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in">
        <p class="text-slate-500 text-sm">Loading announcement logs...</p>
      </div>

    </main>
  </div>

  <!-- ADD NOTICE MODAL -->
  <div id="notice-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-xl border border-slate-200 overflow-hidden transform transition-all p-6">
      <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
        <h3 class="font-bold text-lg text-slate-800">Publish Notice Announcement</h3>
        <button onclick="closeNoticeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">✕</button>
      </div>
      
      <form id="notice-form" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Property Scope</label>
            <select id="notice-property-id" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-xs font-semibold cursor-pointer">
              <option value="all">🌐 All Properties</option>
              <!-- Loaded dynamically -->
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Notice Category</label>
            <select id="notice-category" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-xs font-semibold cursor-pointer">
              <option value="General">📢 General Announcement</option>
              <option value="Food">🍽️ Food & Meals Notice</option>
              <option value="Utility">⚡ Rent & Utility Update</option>
              <option value="Maintenance">🛠️ Repairs & Maintenance</option>
              <option value="Warning">⚠️ Warnings & Alerts</option>
            </select>
          </div>
        </div>

        <!-- Preset Templates -->
        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Quick Presets / Templates</label>
          <div class="flex flex-wrap gap-2">
            <button type="button" onclick="applyNoticeTemplate('food')" class="px-2.5 py-1 text-[10px] font-bold border border-slate-200 bg-slate-50 text-slate-600 rounded-lg hover:bg-green-50 hover:text-green-700 hover:border-indigo-200 transition-colors focus:outline-none cursor-pointer">🍽️ Dinner Change</button>
            <button type="button" onclick="applyNoticeTemplate('rent')" class="px-2.5 py-1 text-[10px] font-bold border border-slate-200 bg-slate-50 text-slate-600 rounded-lg hover:bg-green-50 hover:text-green-700 hover:border-indigo-200 transition-colors focus:outline-none cursor-pointer">⚡ Electricity Bill</button>
            <button type="button" onclick="applyNoticeTemplate('water')" class="px-2.5 py-1 text-[10px] font-bold border border-slate-200 bg-slate-50 text-slate-600 rounded-lg hover:bg-green-50 hover:text-green-700 hover:border-indigo-200 transition-colors focus:outline-none cursor-pointer">🛠️ Water Cleaning</button>
            <button type="button" onclick="applyNoticeTemplate('pest')" class="px-2.5 py-1 text-[10px] font-bold border border-slate-200 bg-slate-50 text-slate-600 rounded-lg hover:bg-green-50 hover:text-green-700 hover:border-indigo-200 transition-colors focus:outline-none cursor-pointer">📢 Pest Control</button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Notice Title</label>
          <input type="text" id="notice-title" required placeholder="e.g. Schedule for Pest Control" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Notice Description</label>
          <textarea id="notice-content" required rows="4" placeholder="Draft notice content here..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm"></textarea>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
          <button type="button" onclick="closeNoticeModal()" class="px-4 py-2.5 border border-slate-200 text-slate-500 rounded-xl text-sm font-semibold hover:bg-slate-50">Cancel</button>
          <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-100">Broadcast Now</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/notices.js"></script>
</body>
</html>
