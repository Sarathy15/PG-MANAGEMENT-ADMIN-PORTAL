<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - Maintenance Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="bg-slate-50 min-h-screen flex overflow-hidden">

  <div id="sidebar-container" class="h-screen sticky top-0 hidden md:block"></div>

  <div class="flex-1 flex flex-col min-w-0 overflow-y-auto h-screen">
    <div id="header-container"></div>

    <main class="flex-1 p-6 space-y-6">
      
      <!-- Top actions panel -->
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Maintenance Schedule</h2>
          <p class="text-sm text-slate-500 mt-0.5">Track plumbing, masonry, electrical fixtures repairs, assign staff, and record costs.</p>
        </div>
        <button onclick="openMaintenanceModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-semibold shadow-md shadow-indigo-150 transition-all flex items-center gap-2 text-sm">
          <i data-lucide="plus" class="w-4.5 h-4.5"></i>
          <span>Schedule Task</span>
        </button>
      </div>

      <!-- Filters Panel -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-wrap gap-4 items-center justify-between">
        <div class="flex flex-wrap items-center gap-3">
          <select id="filter-maint-status" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-slate-700 text-xs font-semibold cursor-pointer">
            <option value="all">🌐 All Statuses</option>
            <option value="Pending">Pending</option>
            <option value="Scheduled">Scheduled</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <span class="text-xs text-slate-400 font-semibold" id="maint-count-txt">0 tasks scheduled</span>
      </div>

      <!-- Maintenance Cards Grid -->
      <div id="maint-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
        <p class="text-slate-500 text-sm">Loading tasks...</p>
      </div>

    </main>
  </div>

  <!-- ADD MAINTENANCE MODAL -->
  <div id="maint-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-xl border border-slate-200 overflow-hidden transform transition-all p-6">
      <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
        <h3 id="maint-modal-title" class="font-bold text-lg text-slate-800">Schedule Repair Task</h3>
        <button onclick="closeMaintenanceModal()" class="text-slate-400 hover:text-slate-600 transition-colors">✕</button>
      </div>
      
      <form id="maint-form" class="space-y-4">
        <input type="hidden" id="maint-id">
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Property Host</label>
          <select id="maint-property-id" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
            <!-- Loaded dynamically -->
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Task Description</label>
          <input type="text" id="maint-title" required placeholder="e.g. Lobby light fixture overhaul" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Room unit (optional)</label>
            <input type="text" id="maint-room" placeholder="e.g. 104" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Est. Cost (INR)</label>
            <input type="number" id="maint-cost" required placeholder="e.g. 1500" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Assign Staff Helper</label>
            <select id="maint-staff-id" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
              <option value="">-- No staff assigned --</option>
              <!-- Loaded dynamically -->
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Schedule Date</label>
            <input type="date" id="maint-date" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
          </div>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
          <button type="button" onclick="closeMaintenanceModal()" class="px-4 py-2.5 border border-slate-200 text-slate-500 rounded-xl text-sm font-semibold hover:bg-slate-50">Cancel</button>
          <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-100">Schedule Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/maintenance.js"></script>
</body>
</html>
