<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - Tenant Complaints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="bg-slate-50 min-h-screen flex overflow-hidden">
  <!-- Page Loader Splash -->
  <div id="page-loader-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f8fafc; z-index: 999999; display: flex; align-items: center; justify-content: center; transition: opacity 0.25s ease-out, visibility 0.25s ease-out;">
    <div style="width: 40px; height: 40px; border: 3.5px solid rgba(125, 194, 66, 0.12); border-top-color: #7DC242; border-radius: 50%; animation: loader-spin 0.6s linear infinite;"></div>
    <style>@keyframes loader-spin { to { transform: rotate(360deg); } }</style>
    <script>(function(){const fade=()=>{const el=document.getElementById('page-loader-overlay');if(el){el.style.opacity='0';el.style.visibility='hidden';setTimeout(()=>el.remove(),250);}};document.addEventListener('DOMContentLoaded',fade);window.addEventListener('load',fade);setTimeout(fade,1200);})();</script>
  </div>

  <div id="sidebar-container" class="h-screen sticky top-0 hidden md:block"></div>

  <div class="flex-1 flex flex-col min-w-0 overflow-y-auto h-screen">
    <div id="header-container"></div>

    <main class="flex-1 p-6 space-y-6">
      
      <!-- Top actions panel -->
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Tenant Complaints Portal</h2>
          <p class="text-sm text-slate-500 mt-0.5">Track, categorize, resolve, and audit grievances, feedback, and utilities complaints.</p>
        </div>
        <button onclick="openComplaintModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-semibold shadow-md shadow-indigo-150 transition-all flex items-center gap-2 text-sm">
          <i data-lucide="plus" class="w-4.5 h-4.5"></i>
          <span>File Complaint</span>
        </button>
      </div>

      <!-- Filters Panel -->
      <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-wrap gap-4 items-center justify-between">
        <div class="flex flex-wrap items-center gap-3">
          <select id="filter-complaint-priority" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-slate-700 text-xs font-semibold cursor-pointer">
            <option value="all">🌐 All Priorities</option>
            <option value="High">High Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="Low">Low Priority</option>
          </select>
          <select id="filter-complaint-status" class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-slate-700 text-xs font-semibold cursor-pointer">
            <option value="all">🌐 All Statuses</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
        <span class="text-xs text-slate-400 font-semibold" id="complaints-count-txt">0 complaints listed</span>
      </div>

      <!-- Table View of Complaints -->
      <div class="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm animate-fade-in">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-200 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
              <th class="px-6 py-4">Title / Issue</th>
              <th class="px-6 py-4">Tenant</th>
              <th class="px-6 py-4">Room unit</th>
              <th class="px-6 py-4">Category</th>
              <th class="px-6 py-4">Priority</th>
              <th class="px-6 py-4">Lodged Date</th>
              <th class="px-6 py-4">Status</th>
              <th class="px-6 py-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="complaints-table-body" class="divide-y divide-slate-100 text-xs text-slate-700 font-medium">
            <tr>
              <td colspan="8" class="px-6 py-4 text-center text-slate-400">Loading complaints registry...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- ADD COMPLAINT MODAL -->
  <div id="complaint-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-xl border border-slate-200 overflow-hidden transform transition-all p-6">
      <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
        <h3 class="font-bold text-lg text-slate-800">File Tenant Complaint</h3>
        <button onclick="closeComplaintModal()" class="text-slate-400 hover:text-slate-600 transition-colors">✕</button>
      </div>
      
      <form id="complaint-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Tenant Affected</label>
          <select id="complaint-tenant-id" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
            <!-- Loaded dynamically -->
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Complaint Title</label>
          <input type="text" id="complaint-title" required placeholder="e.g. Geyser not heating up" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Detailed Description</label>
          <textarea id="complaint-desc" required rows="3" placeholder="Explain the exact details..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Grievance Category</label>
            <select id="complaint-category" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
              <option value="Electrical">Electrical</option>
              <option value="Plumbing">Plumbing</option>
              <option value="Housekeeping">Housekeeping</option>
              <option value="Internet">Internet</option>
              <option value="CCTV">CCTV</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Priority Level</label>
            <select id="complaint-priority" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
          <button type="button" onclick="closeComplaintModal()" class="px-4 py-2.5 border border-slate-200 text-slate-500 rounded-xl text-sm font-semibold hover:bg-slate-50">Cancel</button>
          <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-100">Submit Complaint</button>
        </div>
      </form>
    </div>
  </div>

  <!-- RESOLVE COMPLAINT MODAL -->
  <div id="resolve-complaint-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-xl border border-slate-200 overflow-hidden transform transition-all p-6">
      <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
        <h3 class="font-bold text-lg text-slate-800">Resolve Complaint & Log Expense</h3>
        <button onclick="closeResolveModal()" class="text-slate-400 hover:text-slate-600 transition-colors">✕</button>
      </div>
      
      <form id="resolve-form" class="space-y-4">
        <input type="hidden" id="resolve-complaint-id">
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Assigned Staff Name</label>
          <select id="resolve-staff-id" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
            <!-- Loaded dynamically -->
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Resolution Expense Cost (₹)</label>
          <input type="number" id="resolve-cost" required min="0" placeholder="e.g. 500" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Resolution Date</label>
          <input type="date" id="resolve-date" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
          <button type="button" onclick="closeResolveModal()" class="px-4 py-2.5 border border-slate-200 text-slate-500 rounded-xl text-sm font-semibold hover:bg-slate-50">Cancel</button>
          <button type="submit" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-emerald-100">Mark Solved</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/complaints.js"></script>
</body>
</html>
