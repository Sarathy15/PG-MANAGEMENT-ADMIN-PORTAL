<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - Tenant Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .login-bg {
      min-height: 100vh;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6366f1 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: #fff; border-radius: 1.5rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.18);
      width: 100%; max-width: 380px;
      padding: 2rem;
    }
  </style>
</head>
<body class="login-bg">
  <div class="login-card">
    <div class="text-center mb-7">
      <div class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">
        <i data-lucide="home" class="w-7 h-7 text-white"></i>
      </div>
      <h1 class="text-xl font-extrabold text-slate-900 font-heading">Pleasant Homes</h1>
      <p class="text-slate-400 text-sm mt-1">Tenant Portal Login</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Phone Number</label>
        <input id="l-phone" type="text" required placeholder="+91 9876543210"
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm focus:outline-none focus:border-indigo-400" style="transition:border .2s">
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Your Full Name (for verification)</label>
        <input id="l-name" type="text" required placeholder="As registered with PG"
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 text-sm focus:outline-none focus:border-indigo-400" style="transition:border .2s">
      </div>
      <button type="submit" id="l-btn" class="w-full text-white font-bold text-sm rounded-xl py-3 transition-all flex items-center justify-center gap-2" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 20px rgba(99,102,241,.3)">
        <i data-lucide="log-in" class="w-4 h-4"></i> Login to Dashboard
      </button>
    </form>

    <div id="l-error" class="hidden mt-3 bg-rose-50 border border-rose-200 text-rose-700 text-xs font-semibold rounded-xl p-3 flex items-center gap-2">
      <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
      <span id="l-error-msg">Phone or name not found. Please check with your PG manager.</span>
    </div>

    <p class="text-center text-xs text-slate-400 mt-5">
      Not a tenant? <a href="/frontend/management-dashboard.html" class="text-indigo-600 font-semibold hover:underline">Admin Login</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();
    document.addEventListener('DOMContentLoaded', function() {
      if (window.lucide) lucide.createIcons();
      // If already logged in, redirect
      try {
        var s = JSON.parse(localStorage.getItem('tenant_session') || 'null');
        if (s && s.tenantId) { window.location.href = '/frontend/tenant-dashboard.html'; }
      } catch(e) {}
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var phone = document.getElementById('l-phone').value.trim();
      var name  = document.getElementById('l-name').value.trim().toLowerCase();
      var btn   = document.getElementById('l-btn');
      var errEl = document.getElementById('l-error');
      var errMsg= document.getElementById('l-error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'Verifying...';

      try {
        var resp = await window.apiRequest('/tenants');
        var all  = Array.isArray(resp) ? resp : (resp.data || []);

        // Find tenant matching phone and name (case-insensitive, partial match)
        var match = all.find(function(t) {
          var tPhone = (t.phone || '').replace(/\s+/g, '').replace(/^\+91/, '');
          var iPhone = phone.replace(/\s+/g, '').replace(/^\+91/, '');
          var tName  = (t.full_name || t.name || t.tenantName || '').toLowerCase();
          var phoneMatch = tPhone === iPhone || (t.phone || '') === phone;
          var nameMatch  = tName.includes(name) || name.includes(tName.split(' ')[0]);
          return phoneMatch && nameMatch;
        });

        if (!match) {
          errMsg.textContent = 'No tenant found with this phone and name. Please check with your PG manager.';
          errEl.classList.remove('hidden');
        } else if ((match.status || '').toLowerCase() === 'checked_out') {
          errMsg.textContent = 'Your account is checked out. Please contact management.';
          errEl.classList.remove('hidden');
        } else {
          localStorage.setItem('tenant_session', JSON.stringify({ tenantId: match.id, name: match.full_name || match.name }));
          window.location.href = '/frontend/tenant-dashboard.html';
        }
      } catch(err) {
        errMsg.textContent = err.message || 'Login failed. Please try again.';
        errEl.classList.remove('hidden');
      }
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i> Login to Dashboard';
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
