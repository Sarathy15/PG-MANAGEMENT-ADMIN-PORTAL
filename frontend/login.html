<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      background: linear-gradient(135deg, #eef2ff 0%, #f0f4ff 40%, #faf5ff 100%);
      font-family: 'Inter', sans-serif;
    }
    .blob1 { position:fixed;top:-80px;left:-80px;width:400px;height:400px;border-radius:50%;background:rgba(99,102,241,0.08);filter:blur(60px);pointer-events:none;z-index:0; }
    .blob2 { position:fixed;bottom:-100px;right:-60px;width:500px;height:500px;border-radius:50%;background:rgba(139,92,246,0.07);filter:blur(80px);pointer-events:none;z-index:0; }
    .card {
      position:relative;z-index:1;width:100%;max-width:26rem;
      background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-radius:1.5rem;border:1px solid rgba(226,232,240,0.9);
      box-shadow:0 4px 6px rgba(0,0,0,0.04),0 24px 60px rgba(99,102,241,0.1);
      padding:2.5rem;
      transition: all 0.3s ease;
    }
    /* Panel switcher */
    .tab-toggle {
      display:flex;background:#f1f5f9;border-radius:1rem;padding:4px;gap:4px;margin-bottom:1.75rem;
    }
    .tab-btn {
      flex:1;padding:.5rem .75rem;border-radius:.75rem;border:none;cursor:pointer;
      font-size:.75rem;font-weight:700;font-family:'Outfit',sans-serif;letter-spacing:.02em;
      transition:all .22s ease;color:#64748b;background:transparent;
    }
    .tab-btn.active { background:#fff;color:#6366f1;box-shadow:0 1px 6px rgba(99,102,241,.18); }
    /* Input style */
    .inp {
      width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:.875rem;
      padding:.75rem 1rem;font-size:.875rem;color:#1e293b;transition:all .22s ease;
    }
    .inp:focus { outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.14);background:#fff; }
    .inp-label { display:block;font-size:.6875rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem; }
    /* Primary button */
    .btn-primary {
      width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
      padding:.875rem;border-radius:.875rem;font-size:.9375rem;font-weight:700;
      font-family:'Outfit',sans-serif;border:none;cursor:pointer;
      box-shadow:0 4px 16px rgba(99,102,241,.35);transition:all .22s cubic-bezier(.16,1,.3,1);letter-spacing:-.01em;
    }
    .btn-primary:hover { transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.45); }
    .btn-primary:active { transform:scale(.97); }
    /* Google button */
    .btn-google {
      width:100%;background:#fff;color:#374151;border:1.5px solid #e2e8f0;
      padding:.75rem;border-radius:.875rem;font-size:.875rem;font-weight:600;
      font-family:'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.625rem;
      transition:all .22s ease;box-shadow:0 1px 4px rgba(0,0,0,.06);
    }
    .btn-google:hover { border-color:#a5b4fc;background:#f5f3ff;box-shadow:0 2px 10px rgba(99,102,241,.12); }
    /* OR divider */
    .or-divider { display:flex;align-items:center;gap:.75rem;margin:.25rem 0; }
    .or-divider span { font-size:.6875rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap; }
    .or-divider::before,.or-divider::after { content:'';flex:1;height:1px;background:#f1f5f9; }
    /* Error */
    .err-box { background:#fff1f2;border:1px solid #fecdd3;color:#be123c;border-radius:.875rem;padding:.875rem 1rem;font-size:.8125rem;font-weight:500;margin-bottom:1.25rem; }
    /* Panel animation */
    .panel { animation: fadeSlideIn .25s ease; }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    /* Demo btn */
    .demo-btn {
      padding:.625rem .75rem;border:1px solid #e2e8f0;border-radius:.875rem;text-align:left;
      background:#fff;cursor:pointer;transition:all .2s ease;width:100%;
    }
    .demo-btn:hover { border-color:#a5b4fc;background:#f5f3ff; }
    /* Tenant accent */
    .btn-primary.tenant { background:linear-gradient(135deg,#0ea5e9,#6366f1); box-shadow:0 4px 16px rgba(14,165,233,.3); }
    .btn-primary.tenant:hover { box-shadow:0 8px 24px rgba(14,165,233,.45); }
  </style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="card animate-fade-in">

    <!-- Brand Header -->
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="width:72px;height:72px;border-radius:50%;background:#fff;border:2px solid rgba(99,102,241,.2);box-shadow:0 0 0 6px rgba(99,102,241,.07),0 4px 16px rgba(99,102,241,.15);overflow:hidden;margin:0 auto 1rem;">
        <img src="/assets/logo.jpeg" alt="Pleasant Homes" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <h2 style="font-size:1.5rem;font-weight:700;color:#1e293b;letter-spacing:-.02em;font-family:'Outfit',sans-serif;" id="card-title">Welcome to Pleasant Homes</h2>
      <p style="font-size:.875rem;color:#64748b;margin-top:.25rem;" id="card-subtitle">Sign in to your management portal</p>
    </div>

    <!-- Tab Toggle -->
    <div class="tab-toggle">
      <button class="tab-btn active" id="tab-admin" onclick="showPanel('admin')">
        Admin / Staff
      </button>
      <button class="tab-btn" id="tab-tenant" onclick="showPanel('tenant')">
        Tenant Login
      </button>
    </div>

    <!-- Error alert (shared) -->
    <div id="error-alert" class="err-box hidden"></div>

    <!-- ── ADMIN PANEL ── -->
    <div id="panel-admin" class="panel">
      <form id="login-form" style="display:flex;flex-direction:column;gap:1rem;">
        <div>
          <label for="email" class="inp-label">Email Address</label>
          <input type="email" id="email" class="inp" required placeholder="admin@pg.com"
            onfocus="this.classList.add('focused')" onblur="this.classList.remove('focused')">
        </div>
        <div>
          <label for="password" class="inp-label">Password</label>
          <input type="password" id="password" class="inp" required placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        </div>
        <button type="submit" class="btn-primary">Sign In &rarr;</button>
      </form>

      <!-- Demo accounts -->
      <div style="margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid #f1f5f9;">
        <p style="font-size:.625rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;text-align:center;margin-bottom:.75rem;">Demo Accounts</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.625rem;">
          <button class="demo-btn" onclick="fillAndSubmit('admin@pg.com','admin123')">
            <p style="font-size:.75rem;font-weight:700;color:#374151;">Property Admin</p>
            <p style="font-size:.625rem;color:#94a3b8;margin-top:2px;">admin123</p>
          </button>
          <button class="demo-btn" onclick="fillAndSubmit('staff@pgms.com','staff123')">
            <p style="font-size:.75rem;font-weight:700;color:#374151;">Staff Member</p>
            <p style="font-size:.625rem;color:#94a3b8;margin-top:2px;">staff123</p>
          </button>
        </div>
      </div>
    </div>

    <!-- ── TENANT PANEL ── -->
    <div id="panel-tenant" style="display:none;" class="panel">
      <!-- Continue with Google -->
      <button class="btn-google" id="google-login-btn" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="or-divider" style="margin:.9rem 0;">
        <span>or sign in with email</span>
      </div>

      <form id="tenant-form" style="display:flex;flex-direction:column;gap:1rem;">
        <div>
          <label for="t-email" class="inp-label">Email Address</label>
          <input type="email" id="t-email" class="inp" required placeholder="yourname@email.com">
        </div>
        <div>
          <label for="t-password" class="inp-label">Password</label>
          <input type="password" id="t-password" class="inp" required placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
        </div>
        <button type="submit" class="btn-primary tenant">Access My Dashboard &rarr;</button>
      </form>

      <p style="text-align:center;font-size:.75rem;color:#94a3b8;margin-top:1rem;">
        Need access? Contact your PG manager to get registered.
      </p>
    </div>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/state.js"></script>
  <script>
    lucide.createIcons();

    // Already authenticated as admin?
    if (window.Auth && window.Auth.isAuthenticated()) {
      window.location.href = '/management-dashboard.html';
    }

    var errorAlert = document.getElementById('error-alert');

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.remove('hidden');
    }
    function hideError() {
      errorAlert.classList.add('hidden');
    }

    // ── Panel switcher ──
    function showPanel(which) {
      hideError();
      var isAdmin = which === 'admin';
      document.getElementById('panel-admin').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('panel-tenant').style.display = isAdmin ? 'none' : 'block';
      document.getElementById('tab-admin').classList.toggle('active', isAdmin);
      document.getElementById('tab-tenant').classList.toggle('active', !isAdmin);
      document.getElementById('card-title').textContent = isAdmin ? 'Welcome to Pleasant Homes' : 'Tenant Portal';
      document.getElementById('card-subtitle').textContent = isAdmin ? 'Sign in to your management portal' : 'Login to view your room & rent details';
      // re-animate panel
      var panel = document.getElementById('panel-' + which);
      panel.classList.remove('panel');
      void panel.offsetWidth; // reflow
      panel.classList.add('panel');
    }

    // ── Admin login form ──
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideError();
      var email    = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      try {
        await window.Auth.login(email, password);
        window.location.href = '/management-dashboard.html';
      } catch(err) {
        showError(err.message || 'Login failed. Check your credentials.');
      }
    });

    async function fillAndSubmit(email, password) {
      document.getElementById('email').value    = email;
      document.getElementById('password').value = password;
      hideError();
      try {
        await window.Auth.login(email, password);
        window.location.href = '/management-dashboard.html';
      } catch(err) {
        showError(err.message || 'Login failed.');
      }
    }

    // ── Tenant email/password login ──
    document.getElementById('tenant-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideError();
      var email    = document.getElementById('t-email').value.trim().toLowerCase();
      var password = document.getElementById('t-password').value;
      var btn = this.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        // Fetch all tenants and match by email + password (plain match — upgrade to hashed later)
        var resp = await window.apiRequest('/tenants');
        var all  = Array.isArray(resp) ? resp : (resp.data || []);
        var match = all.find(function(t) {
          var tEmail = (t.email || '').toLowerCase();
          var tPass  = t.password || t.pass || '';
          return tEmail === email && (tPass === password || password === tEmail.split('@')[0]);
        });

        if (!match) {
          // Fallback: match by email only (for demo — tenant may not have password stored)
          match = all.find(function(t) {
            return (t.email || '').toLowerCase() === email;
          });
          if (!match) {
            showError('No tenant account found with this email. Please contact your PG manager.');
            return;
          }
        }

        if ((match.status || '').toLowerCase() === 'checked_out') {
          showError('Your stay has ended. Please contact management.');
          return;
        }

        localStorage.setItem('tenant_session', JSON.stringify({ tenantId: match.id, name: match.full_name || match.name || '' }));
        window.location.href = '/frontend/tenant-dashboard.html';
      } catch(err) {
        showError(err.message || 'Login failed. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Access My Dashboard \u2192';
      }
    });

    // ── Google OAuth (Tenant) ──
    function handleGoogleLogin() {
      // In production, wire this to your Supabase/Firebase Google OAuth flow.
      // For now, redirect to Supabase Google login endpoint.
      var SUPABASE_URL = window._env && window._env.SUPABASE_URL;
      if (SUPABASE_URL) {
        window.location.href = SUPABASE_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(window.location.origin + '/frontend/tenant-dashboard.html');
      } else {
        // Fallback: show info
        showError('Google login requires backend configuration. Please use email login or contact your manager.');
      }
    }
  </script>
</body>
</html>
