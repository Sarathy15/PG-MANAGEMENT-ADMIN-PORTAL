<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - Portal Login</title>
  <link rel="preconnect" href="https://phenomenal-cassata-5425f6.netlify.app" crossorigin>
  <link rel="dns-prefetch" href="https://phenomenal-cassata-5425f6.netlify.app">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      font-family: 'Inter', sans-serif;
      pointer-events: none;
      /* Capture NO pointer events on body wrapper so clicks/scrolls pass through to iframe */
      background: #faf6ee;
      /* matches the landing page cream background to avoid white flashes */
    }

    .iframe-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: 0;
      pointer-events: auto;
      /* Enable scrolling/interaction on the iframe website background */
    }

    .login-container {
      position: fixed;
      top: 50%;
      right: 60px;
      transform: translateY(-50%) translateY(15px);
      z-index: 10;
      width: 100%;
      max-width: 26rem;
      pointer-events: auto;
      /* Enable form inputs and button clicks */
      opacity: 0;
      animation: floatFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.1s;
    }

    .login-card-glass {
      width: 100%;
      max-width: 460px;
      padding: 3rem;

      /* Luxury warm glass */
      background: rgba(252, 249, 244, 0.86);

      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);

      border: 1px solid rgba(255, 255, 255, 0.55);

      border-radius: 32px;

      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.12),
        0 16px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);

      transition: all .35s cubic-bezier(.16, 1, .3, 1);
    }

    .login-card-glass:hover {
      transform: translateY(-4px);
      box-shadow:
        0 50px 100px rgba(0, 0, 0, .15),
        0 20px 40px rgba(0, 0, 0, .10),
        inset 0 1px 0 rgba(255, 255, 255, .9);
    }

    @keyframes floatFadeIn {
      to {
        opacity: 1;
        transform: translateY(-50%) translateY(0);
      }
    }

    @media (max-width: 1024px) {
      .login-container {
        right: 40px;
        max-width: 24rem;
      }
    }

    @media (max-width: 768px) {
      body {
        overflow: auto;
        pointer-events: auto;
      }

      .iframe-bg {
        filter: blur(8px);
        transform: scale(1.05);
        pointer-events: none;
      }

      .login-container {
        position: relative;
        top: 0;
        right: 0;
        transform: none;
        margin: 2rem auto;
        padding: 1rem;
        max-width: 90%;
        display: flex;
        align-items: center;
        justify-content: center;
        height: auto;
        min-height: 80vh;
        animation: mobileFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .login-card-glass {
        padding: 2rem 1.5rem;
      }

      @keyframes mobileFadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 26rem;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid rgba(226, 232, 240, 0.9);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.04), 0 24px 60px rgba(99, 102, 241, 0.1);
      padding: 2.5rem;
      transition: all 0.3s ease;
    }

    /* Input style */
    .inp {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: .875rem;
      padding: .75rem 1rem;
      font-size: .875rem;
      color: #1e293b;
      transition: all .22s ease;
    }

    .inp:focus {
      outline: none;
      border-color: #7DC242;
      box-shadow: 0 0 0 3px rgba(125, 194, 66, .14);
      background: #fff;
    }

    .inp-label {
      display: block;
      font-size: .6875rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: .4rem;
    }

    /* Primary button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #7DC242, #5fa832);
      color: #fff;
      padding: .875rem;
      border-radius: .875rem;
      font-size: .9375rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(125, 194, 66, .35);
      transition: all .22s cubic-bezier(.16, 1, .3, 1);
      letter-spacing: -.01em;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(125, 194, 66, .45);
    }

    .btn-primary:active {
      transform: scale(.97);
    }

    /* Error */
    .err-box {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #be123c;
      border-radius: .875rem;
      padding: .875rem 1rem;
      font-size: .8125rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    /* Panel animation */
    .panel {
      animation: fadeSlideIn .25s ease;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <!-- Fullscreen Webpage Background -->
  <iframe class="iframe-bg" id="websiteFrame" src="https://phenomenal-cassata-5425f6.netlify.app/"
    loading="eager"></iframe>

  <!-- Floating Login Panel Container -->
  <div class="login-container">
    <div class="login-card-glass animate-fade-in">

      <!-- Brand Header -->
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div
          style="width:140px;height:70px;background:transparent;overflow:hidden;margin:0 auto 1rem;display:flex;justify-content:center;align-items:center;">
          <img src="/assets/logo.png?v=1.0.2" alt="Pleasant Homes"
            style="max-width:100%;max-height:100%;object-fit:contain;">
        </div>
        <h2
          style="font-size:1.5rem;font-weight:700;color:#1e293b;letter-spacing:-.02em;font-family:'Outfit',sans-serif;"
          id="card-title">Welcome to Pleasant Homes</h2>
        <p style="font-size:.875rem;color:#64748b;margin-top:.25rem;" id="card-subtitle">Sign in to your management
          portal</p>
      </div>

      <!-- Error alert (shared) -->
      <div id="error-alert" class="err-box hidden" style="margin-top: 1rem;"></div>

      <!-- ── ADMIN PANEL ── -->
      <div id="panel-admin" class="panel">
        <form id="login-form" style="display:flex;flex-direction:column;gap:1rem;">
          <div>
            <label for="email" class="inp-label">Email Address</label>
            <input type="email" id="email" class="inp" required placeholder="pleasanthomes@pg.com"
              onfocus="this.classList.add('focused')" onblur="this.classList.remove('focused')">
          </div>
          <div>
            <label for="password" class="inp-label">Password</label>
            <div style="position: relative;">
              <input type="password" id="password" class="inp" required
                placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" style="padding-right: 2.75rem;">
              <button type="button" id="toggle-password" style="
                position: absolute;
                right: 0.875rem;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                color: #94a3b8;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
              ">
                <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Sign In &rarr;</button>
        </form>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/state.js"></script>
  <script>
    lucide.createIcons();

    // Toggle password visibility
    const togglePasswordBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    if (togglePasswordBtn && passwordInput) {
      togglePasswordBtn.addEventListener('click', function () {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');

        // Update Lucide icon
        const icon = togglePasswordBtn.querySelector('i');
        if (icon) {
          icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }
      });
    }

    // Already authenticated as admin?
    if (window.Auth && window.Auth.isAuthenticated()) {
      window.location.href = '/management-dashboard.html';
    }

    var errorAlert = document.getElementById('error-alert');

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.remove('hidden');
    }
    function hideError() {
      errorAlert.classList.add('hidden');
    }

    // ── Admin login form ──
    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      try {
        await window.Auth.login(email, password);
        window.location.href = '/management-dashboard.html';
      } catch (err) {
        showError(err.message || 'Login failed. Check your credentials.');
      }
    });

    async function fillAndSubmit(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      hideError();
      try {
        await window.Auth.login(email, password);
        window.location.href = '/management-dashboard.html';
      } catch (err) {
        showError(err.message || 'Login failed.');
      }
    }
  </script>
</body>

</html>
