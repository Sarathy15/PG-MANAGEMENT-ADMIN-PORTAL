<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pleasant Homes - System Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body class="bg-slate-50 min-h-screen flex overflow-hidden">

  <div id="sidebar-container" class="h-screen sticky top-0 hidden md:block"></div>

  <div class="flex-1 flex flex-col min-w-0 overflow-y-auto h-screen">
    <div id="header-container"></div>

    <main class="flex-1 p-6 space-y-6">
      
      <!-- Top actions panel -->
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-800 tracking-tight">System Configuration</h2>
          <p class="text-sm text-slate-500 mt-0.5">Define PG rules, set payment terms, configure notifications, and handle system triggers.</p>
        </div>
      </div>

      <!-- Settings Layout -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Tab Selectors -->
        <div class="lg:col-span-1 space-y-2">
          <button onclick="switchTab('general')" id="tab-btn-general" class="w-full text-left px-4 py-3 bg-white border border-slate-200 rounded-xl font-semibold text-xs text-indigo-600 shadow-sm flex items-center gap-2">
            <i data-lucide="sliders" class="w-4 h-4"></i>
            <span>General Setup</span>
          </button>
          <button onclick="switchTab('finance')" id="tab-btn-finance" class="w-full text-left px-4 py-3 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl font-semibold text-xs text-slate-600 flex items-center gap-2">
            <i data-lucide="indian-rupee" class="w-4 h-4"></i>
            <span>Financial & Fees Policies</span>
          </button>
          <button onclick="switchTab('security')" id="tab-btn-security" class="w-full text-left px-4 py-3 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl font-semibold text-xs text-slate-600 flex items-center gap-2">
            <i data-lucide="lock" class="w-4 h-4"></i>
            <span>Security & Access Logs</span>
          </button>
        </div>

        <!-- Tab Content Cards -->
        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
          
          <!-- General Setup Content -->
          <div id="tab-content-general" class="space-y-6">
            <h3 class="font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center gap-2">
              <i data-lucide="sliders" class="w-5 h-5 text-indigo-600"></i>
              <span>General PG Rules Setup</span>
            </h3>
            
            <form id="settings-general-form" class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Host Portal Name</label>
                  <input type="text" id="setting-pg-name" required value="Pleasant Homes Systems" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Warden Name</label>
                  <input type="text" id="setting-warden" required value="Suresh Nair" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
                </div>
              </div>

              <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Gate Curfew Hours</label>
                <input type="text" id="setting-curfew" required value="10:30 PM" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
              </div>

              <div class="flex items-center justify-end pt-4 border-t border-slate-100">
                <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-100">Save General Settings</button>
              </div>
            </form>
          </div>

          <!-- Financial Setup Content -->
          <div id="tab-content-finance" class="space-y-6 hidden">
            <h3 class="font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center gap-2">
              <i data-lucide="indian-rupee" class="w-5 h-5 text-indigo-600"></i>
              <span>Financial & Billing Rules</span>
            </h3>
            
            <form id="settings-finance-form" class="space-y-4">
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Rent Due Date</label>
                  <input type="number" id="setting-due-day" required value="5" min="1" max="28" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
                  <p class="text-[10px] text-slate-400 mt-1">Calendar day of the month rent invoices expire.</p>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Late Payment Fine (INR)</label>
                  <input type="number" id="setting-fine" required value="500" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 text-sm">
                </div>
              </div>

              <div class="flex items-center justify-end pt-4 border-t border-slate-100">
                <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-100">Save Financial Policies</button>
              </div>
            </form>
          </div>

          <!-- Security Content -->
          <div id="tab-content-security" class="space-y-6 hidden">
            <h3 class="font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center gap-2">
              <i data-lucide="lock" class="w-5 h-5 text-indigo-600"></i>
              <span>Security, Verification & KYC settings</span>
            </h3>
            
            <form id="settings-security-form" class="space-y-4">
              <div class="space-y-3">
                <label class="flex items-start gap-3 cursor-pointer">
                  <input type="checkbox" checked class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 mt-1">
                  <div>
                    <p class="text-xs font-bold text-slate-700">Require Aadhaar / Government KYC Verification</p>
                    <p class="text-[10px] text-slate-400">Strictly enforce documentation uploads when checking in a new occupant.</p>
                  </div>
                </label>

                <label class="flex items-start gap-3 cursor-pointer">
                  <input type="checkbox" checked class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 mt-1">
                  <div>
                    <p class="text-xs font-bold text-slate-700">Send WhatsApp / Email Rent Alerts</p>
                    <p class="text-[10px] text-slate-400">Dispatch payment reminders to emergency contacts and tenants dynamically on invoices issuance.</p>
                  </div>
                </label>
              </div>

              <div class="flex items-center justify-end pt-4 border-t border-slate-100">
                <button type="submit" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-semibold shadow-md shadow-indigo-100">Save Security Rules</button>
              </div>
            </form>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/router.js"></script>
  <script>
    function switchTab(tab) {
      // Hide all contents
      document.getElementById('tab-content-general').classList.add('hidden');
      document.getElementById('tab-content-finance').classList.add('hidden');
      document.getElementById('tab-content-security').classList.add('hidden');
      
      // Unhighlight all buttons
      document.getElementById('tab-btn-general').classList.remove('text-indigo-600', 'shadow-sm');
      document.getElementById('tab-btn-general').classList.add('text-slate-600');
      document.getElementById('tab-btn-finance').classList.remove('text-indigo-600', 'shadow-sm');
      document.getElementById('tab-btn-finance').classList.add('text-slate-600');
      document.getElementById('tab-btn-security').classList.remove('text-indigo-600', 'shadow-sm');
      document.getElementById('tab-btn-security').classList.add('text-slate-600');
      
      // Show selected content
      document.getElementById('tab-content-' + tab).classList.remove('hidden');
      
      // Highlight selected button
      const activeBtn = document.getElementById('tab-btn-' + tab);
      activeBtn.classList.add('text-indigo-600', 'shadow-sm');
      activeBtn.classList.remove('text-slate-600');
    }

    // Forms save triggers
    document.getElementById('settings-general-form').addEventListener('submit', (e) => {
      e.preventDefault();
      window.UI.toast('General settings saved successfully!', 'success');
    });

    document.getElementById('settings-finance-form').addEventListener('submit', (e) => {
      e.preventDefault();
      window.UI.toast('Billing policies saved successfully!', 'success');
    });

    document.getElementById('settings-security-form').addEventListener('submit', (e) => {
      e.preventDefault();
      window.UI.toast('Security policies and KYC guidelines saved successfully!', 'success');
    });
  </script>
</body>
</html>
